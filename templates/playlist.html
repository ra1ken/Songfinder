<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Songfinder - Playlist</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    (function () {
      const theme = "{{ active_theme }}";
      if (theme === 'on' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark-mode');
      }
    })();
  </script>
</head>

<body>
  <header class="header">
    <div class="header__container">
      <a href="{{ url_for('index') }}" class="header__logo">
        <div class="header__logo-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--bg-white)" stroke-width="2">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="18" cy="16" r="3" />
          </svg>
        </div>
        <span class="header__logo-text">Songfinder</span>
      </a>
      <button class="hamburger-btn" id="hamburger-btn" aria-label="Menu" aria-expanded="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
      <nav class="header__nav">
        <a href="{{ url_for('index') }}" class="header__nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
            <polyline points="9 22 9 12 15 12 15 22" />
          </svg>
          {{ t.nav_home }}
        </a>
        <a href="{{ url_for('playlist') }}" class="header__nav-link header__nav-link--active">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="8" y1="6" x2="21" y2="6" />
            <line x1="8" y1="12" x2="21" y2="12" />
            <line x1="8" y1="18" x2="21" y2="18" />
            <line x1="3" y1="6" x2="3.01" y2="6" />
            <line x1="3" y1="12" x2="3.01" y2="12" />
            <line x1="3" y1="18" x2="3.01" y2="18" />
          </svg>
          {{ t.nav_playlist }}
        </a>
        <a href="{{ url_for('about') }}" class="header__nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="16" x2="12" y2="12" />
            <line x1="12" y1="8" x2="12.01" y2="8" />
          </svg>
          {{ t.nav_about }}
        </a>
        <a href="{{ url_for('settings') }}" class="header__nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
          {{ t.nav_settings }}
        </a>
        {% if current_user.is_authenticated %}
        <a href="{{ url_for('logout') }}" class="header__nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          {{ t.nav_logout }}
        </a>
        {% else %}
        <a href="{{ url_for('login') }}" class="header__nav-link">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
          {{ t.nav_login }}
        </a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="main main--playlist">
    <div class="playlist">
      {% if current_user.is_authenticated %}
      <div class="playlist__header">
        <div class="playlist__info">
          <input type="text" id="playlist-title-input" class="playlist__title-input" value="{{ playlist_name }}"
            placeholder="My Playlist" />
          <p class="playlist__meta" id="playlist-meta"></p>
        </div>
      </div>
      <div class="playlist__actions">
        <button class="btn btn--primary" id="export-spotify-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"></circle>
            <polygon points="10 8 16 12 10 16 10 8"></polygon>
          </svg>
          {{ t.export_spotify }}
        </button>
        <button class="btn btn--danger" id="clear-playlist-btn" style="margin-left: '1rem';">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6" />
          </svg>
          {{ t.clear_playlist | default('Smazat playlist') }}
        </button>
      </div>
      <div class="playlist__tracks" id="playlist-tracks"></div>
      <div class="playlist__footer" id="playlist-footer" style="display:none;">
        <span id="playlist-total-tracks"></span>
        <span id="playlist-total-duration"></span>
      </div>
      {% else %}
      <div class="playlist__content" style="text-align: center; padding: 4rem 2rem;">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.5"
          style="margin-bottom: 2rem;">
          <path d="M9 18V5l12-2v13" />
          <circle cx="6" cy="18" r="3" />
          <circle cx="18" cy="16" r="3" />
        </svg>
        <h2 style="color: var(--text-primary); margin-bottom: 1rem;">{{ t.guest_playlist_msg }}</h2>
        <a href="{{ url_for('login') }}" class="btn btn--primary" style="display: inline-block; margin-top: 1rem;">
          {{ t.nav_login }}
        </a>
      </div>
      {% endif %}
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    window.PLAYLIST_TRANSLATIONS = {
      export_spotify: "{{ t.export_spotify }}",
      export_success: "{{ t.export_success }}",
      export_login_required: "{{ t.export_login_required }}",
      playlist_empty: "{{ t.playlist_empty }}",
      remove_from_playlist: "{{ t.remove_from_playlist }}",
      total_tracks: "{{ t.total_tracks_tpl }}",
      total_duration: "{{ t.total_duration_tpl }}"
    };
    window.PLAYLIST_DATA = {{ playlist_items | tojson }};
    window.SPOTIFY_CONNECTED = {{ 'true' if request.args.get('spotify_connected') else 'false' }};
  </script>
  <script src="{{ url_for('static', filename='js/playlist.js') }}"></script>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
</body>

</html>
